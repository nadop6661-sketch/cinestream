<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineStream</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0f;--surface:#13131a;--card:#1a1a25;--accent:#e8b04b;--accent2:#c0392b;--text:#f0ece4;--muted:#6b6880;--border:#2a2a38;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:1000;opacity:.4;}
  header{display:flex;align-items:center;justify-content:space-between;padding:20px 40px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(10,10,15,0.95);backdrop-filter:blur(12px);z-index:100;}
  .logo{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;}
  .logo span{color:var(--accent);}
  .admin-btn{background:var(--accent);color:#000;border:none;padding:8px 20px;border-radius:6px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:.85rem;cursor:pointer;}
  .hero{padding:60px 40px 40px;text-align:center;position:relative;}
  .hero::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:600px;height:200px;background:radial-gradient(ellipse,rgba(232,176,75,.08) 0%,transparent 70%);pointer-events:none;}
  .hero h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:900;line-height:1.1;margin-bottom:12px;}
  .hero p{color:var(--muted);font-size:1rem;font-weight:300;}
  .search-bar{display:flex;max-width:420px;margin:30px auto 0;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .search-bar input{flex:1;background:none;border:none;padding:12px 18px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;}
  .search-bar input::placeholder{color:var(--muted);}
  .search-bar button{background:var(--accent);border:none;padding:12px 18px;color:#000;cursor:pointer;font-size:1.1rem;}
  .section{padding:40px;}
  .section-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;margin-bottom:24px;display:flex;align-items:center;gap:10px;}
  .section-title::after{content:'';flex:1;height:1px;background:var(--border);}
  .movie-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;}
  .movie-card{background:var(--card);border-radius:10px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform .25s,box-shadow .25s,border-color .25s;animation:fadeUp .5s ease both;}
  .movie-card:hover{transform:translateY(-6px);box-shadow:0 20px 40px rgba(0,0,0,.5);border-color:var(--accent);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
  .movie-thumb{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;}
  .thumb-placeholder{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,#1a1a25,#0f0f18);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);font-size:2.5rem;}
  .thumb-placeholder span{font-size:.75rem;letter-spacing:1px;text-transform:uppercase;}
  .movie-info{padding:14px;}
  .movie-title{font-weight:500;font-size:.95rem;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .movie-meta{display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--muted);}
  .movie-badge{background:var(--accent2);color:#fff;padding:2px 7px;border-radius:4px;font-size:.7rem;font-weight:500;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s;}
  .modal-overlay.active{opacity:1;pointer-events:all;}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:14px;width:100%;max-width:820px;max-height:90vh;overflow-y:auto;transform:scale(.95);transition:transform .3s;}
  .modal-overlay.active .modal{transform:scale(1);}
  .modal-video{width:100%;aspect-ratio:16/9;background:#000;border-radius:14px 14px 0 0;overflow:hidden;}
  .modal-video iframe{width:100%;height:100%;border:none;}
  .modal-body{padding:24px;}
  .modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
  .modal-title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;}
  .close-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:50%;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .close-btn:hover{background:var(--accent2);}
  .modal-desc{color:var(--muted);font-size:.9rem;line-height:1.6;}
  .admin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s;}
  .admin-overlay.active{opacity:1;pointer-events:all;}
  .admin-panel{background:var(--card);border:1px solid var(--accent);border-radius:14px;width:100%;max-width:520px;padding:32px;max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:transform .3s;}
  .admin-overlay.active .admin-panel{transform:translateY(0);}
  .admin-title{font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:24px;color:var(--accent);}
  .form-group{margin-bottom:16px;}
  .form-group label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
  .form-group input,.form-group textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;}
  .form-group input:focus,.form-group textarea:focus{border-color:var(--accent);}
  .form-group textarea{height:80px;resize:vertical;}
  .form-hint{font-size:.75rem;color:var(--muted);margin-top:4px;}
  .form-actions{display:flex;gap:10px;margin-top:20px;}
  .btn-primary{flex:1;background:var(--accent);color:#000;border:none;padding:12px;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer;}
  .btn-cancel{background:var(--surface);color:var(--muted);border:1px solid var(--border);padding:12px 20px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.9rem;cursor:pointer;}
  .pass-screen{text-align:center;}
  .pass-screen h2{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:8px;}
  .pass-screen p{color:var(--muted);font-size:.85rem;margin-bottom:20px;}
  .pass-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-size:1rem;text-align:center;letter-spacing:4px;outline:none;margin-bottom:14px;font-family:'DM Sans',sans-serif;}
  .pass-input:focus{border-color:var(--accent);}
  .pass-error{color:var(--accent2);font-size:.8rem;margin-bottom:10px;min-height:18px;}
  .empty-state{text-align:center;padding:60px 20px;color:var(--muted);grid-column:1/-1;}
  .empty-state .icon{font-size:3rem;margin-bottom:12px;}
  .manage-list{margin-top:8px;}
  .manage-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border-radius:8px;margin-bottom:8px;font-size:.85rem;}
  .delete-btn{background:none;border:none;color:var(--accent2);cursor:pointer;font-size:1rem;}
  .tabs{display:flex;gap:6px;margin-bottom:20px;}
  .tab{flex:1;padding:8px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:.8rem;cursor:pointer;text-align:center;transition:all .2s;}
  .tab.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;}
  .tab-content{display:none;}
  .tab-content.active{display:block;}
  @media(max-width:600px){
    header{padding:16px 20px;}
    .hero{padding:40px 20px 30px;}
    .section{padding:30px 20px;}
    .movie-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}
    .admin-panel{padding:24px 20px;}
  }
</style>
</head>
<body>

<header>
  <div class="logo">Cine<span>Stream</span></div>
  <button class="admin-btn" onclick="openAdmin()">⚙ Admin</button>
</header>

<div class="hero">
  <h1>আপনার পছন্দের <span style="color:var(--accent)">মুভি</span> দেখুন</h1>
  <p>Online streaming — কোনো download নেই</p>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="মুভি খুঁজুন..." oninput="filterMovies()">
    <button>🔍</button>
  </div>
</div>

<div class="section">
  <div class="section-title">সব মুভি</div>
  <div class="movie-grid" id="movieGrid"></div>
</div>

<!-- Movie Modal -->
<div class="modal-overlay" id="movieModal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-video" id="modalVideo"></div>
    <div class="modal-body">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modalTitle"></div>
          <div class="movie-meta" style="margin-top:6px">
            <span id="modalYear"></span>
            <span class="movie-badge" id="modalGenre"></span>
          </div>
        </div>
        <button class="close-btn" onclick="closeModalBtn()">✕</button>
      </div>
      <p class="modal-desc" id="modalDesc"></p>
    </div>
  </div>
</div>

<!-- Admin Panel -->
<div class="admin-overlay" id="adminOverlay" onclick="closeAdminOverlay(event)">
  <div class="admin-panel">
    <div id="passScreen" class="pass-screen">
      <h2>🔐 Admin Access</h2>
      <p>Password দিন</p>
      <input type="password" class="pass-input" id="passInput" placeholder="••••••" onkeydown="if(event.key==='Enter')checkPass()">
      <div class="pass-error" id="passError"></div>
      <button class="btn-primary" onclick="checkPass()">প্রবেশ করুন</button>
    </div>

    <div id="adminContent" style="display:none">
      <div class="admin-title">⚙ Admin Panel</div>
      <div class="tabs">
        <div class="tab active" onclick="switchTab('add')">মুভি যোগ</div>
        <div class="tab" onclick="switchTab('manage')">ম্যানেজ</div>
        <div class="tab" onclick="switchTab('settings')">Settings</div>
      </div>

      <div class="tab-content active" id="tab-add">
        <div class="form-group">
          <label>মুভির নাম *</label>
          <input type="text" id="movieName" placeholder="যেমন: Avatar 2">
        </div>
        <div class="form-group">
          <label>Streamtape / Mixdrop Embed Link *</label>
          <input type="text" id="movieEmbed" placeholder="https://streamtape.com/e/xxxxx">
          <div class="form-hint">Streamtape → Share → Embed link কপি করুন</div>
        </div>
        <div class="form-group">
          <label>Thumbnail URL (ঐচ্ছিক)</label>
          <input type="text" id="movieThumb" placeholder="https://...poster.jpg">
        </div>
        <div class="form-group">
          <label>বছর</label>
          <input type="text" id="movieYear" placeholder="2024">
        </div>
        <div class="form-group">
          <label>Genre</label>
          <input type="text" id="movieGenre" placeholder="Action, Drama...">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="movieDesc" placeholder="মুভি সম্পর্কে কিছু লিখুন..."></textarea>
        </div>
        <div class="form-actions">
          <button class="btn-primary" onclick="addMovie()">✓ যোগ করুন</button>
          <button class="btn-cancel" onclick="closeAdmin()">বাতিল</button>
        </div>
      </div>

      <div class="tab-content" id="tab-manage">
        <div class="manage-list" id="manageList"></div>
      </div>

      <div class="tab-content" id="tab-settings">
        <div class="form-group">
          <label>নতুন Password সেট করুন</label>
          <input type="password" id="newPass" placeholder="নতুন password">
          <div class="form-hint">Save করলে নতুন password কাজ করবে</div>
        </div>
        <div class="form-actions">
          <button class="btn-primary" onclick="saveSettings()">Save করুন</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // Password হ্যাশ হিসেবে রাখা — plain text নয়
  // Default password: admin123
  // নিচের hash টা btoa দিয়ে encode করা
  let _h = localStorage.getItem('_cs_ph') || btoa(atob('YWRtaW4xMjM='));
  let movies = JSON.parse(localStorage.getItem('cs_movies') || '[]');

  function _chk(v){ return btoa(v) === _h; }

  function renderGrid(list){
    const g = document.getElementById('movieGrid');
    if(!list.length){
      g.innerHTML='<div class="empty-state"><div class="icon">🎬</div><p>কোনো মুভি নেই। Admin থেকে মুভি যোগ করুন।</p></div>';
      return;
    }
    g.innerHTML = list.map((m,i)=>`
      <div class="movie-card" style="animation-delay:${i*.06}s" onclick="openMovie(${movies.indexOf(m)})">
        ${m.thumb?`<img class="movie-thumb" src="${m.thumb}" alt="${m.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:``}
        <div class="thumb-placeholder" style="${m.thumb?'display:none':''}">🎬<span>${m.name.slice(0,10)}</span></div>
        <div class="movie-info">
          <div class="movie-title">${m.name}</div>
          <div class="movie-meta">
            <span>${m.year||''}</span>
            ${m.genre?`<span class="movie-badge">${m.genre}</span>`:''}
          </div>
        </div>
      </div>`).join('');
  }

  function filterMovies(){
    const q=document.getElementById('searchInput').value.toLowerCase();
    renderGrid(q?movies.filter(m=>m.name.toLowerCase().includes(q)):movies);
  }

  function openMovie(i){
    const m=movies[i];
    document.getElementById('modalTitle').textContent=m.name;
    document.getElementById('modalYear').textContent=m.year||'';
    document.getElementById('modalGenre').textContent=m.genre||'';
    document.getElementById('modalDesc').textContent=m.desc||'';
    document.getElementById('modalVideo').innerHTML=`<iframe src="${m.embed}" allowfullscreen allow="autoplay"></iframe>`;
    document.getElementById('movieModal').classList.add('active');
    document.body.style.overflow='hidden';
  }

  function closeModal(e){if(e.target.id==='movieModal')closeModalBtn();}
  function closeModalBtn(){
    document.getElementById('movieModal').classList.remove('active');
    document.getElementById('modalVideo').innerHTML='';
    document.body.style.overflow='';
  }

  function openAdmin(){
    document.getElementById('adminOverlay').classList.add('active');
    document.getElementById('passScreen').style.display='block';
    document.getElementById('adminContent').style.display='none';
    document.getElementById('passInput').value='';
    document.getElementById('passError').textContent='';
    document.body.style.overflow='hidden';
  }
  function closeAdmin(){
    document.getElementById('adminOverlay').classList.remove('active');
    document.body.style.overflow='';
  }
  function closeAdminOverlay(e){if(e.target.id==='adminOverlay')closeAdmin();}

  function checkPass(){
    const v=document.getElementById('passInput').value;
    if(_chk(v)){
      document.getElementById('passScreen').style.display='none';
      document.getElementById('adminContent').style.display='block';
      renderManage();
    } else {
      document.getElementById('passError').textContent='❌ ভুল password!';
    }
  }

  function switchTab(name){
    const names=['add','manage','settings'];
    document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',names[i]===name));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    document.getElementById('tab-'+name).classList.add('active');
    if(name==='manage')renderManage();
  }

  function addMovie(){
    const name=document.getElementById('movieName').value.trim();
    const embed=document.getElementById('movieEmbed').value.trim();
    if(!name||!embed){alert('নাম এবং Embed link দিন!');return;}
    movies.unshift({
      name, embed,
      thumb:document.getElementById('movieThumb').value.trim(),
      year:document.getElementById('movieYear').value.trim(),
      genre:document.getElementById('movieGenre').value.trim(),
      desc:document.getElementById('movieDesc').value.trim()
    });
    localStorage.setItem('cs_movies',JSON.stringify(movies));
    renderGrid(movies);
    ['movieName','movieEmbed','movieThumb','movieYear','movieGenre','movieDesc'].forEach(id=>document.getElementById(id).value='');
    alert('✅ মুভি যোগ হয়েছে!');
  }

  function renderManage(){
    const list=document.getElementById('manageList');
    if(!movies.length){list.innerHTML='<p style="color:var(--muted);font-size:.85rem">কোনো মুভি নেই।</p>';return;}
    list.innerHTML=movies.map((m,i)=>`
      <div class="manage-item">
        <span>🎬 ${m.name}</span>
        <button class="delete-btn" onclick="delMovie(${i})">🗑</button>
      </div>`).join('');
  }

  function delMovie(i){
    if(!confirm(`"${movies[i].name}" মুছে ফেলবেন?`))return;
    movies.splice(i,1);
    localStorage.setItem('cs_movies',JSON.stringify(movies));
    renderGrid(movies);
    renderManage();
  }

  function saveSettings(){
    const np=document.getElementById('newPass').value.trim();
    if(!np){alert('নতুন password দিন!');return;}
    _h=btoa(np);
    localStorage.setItem('_cs_ph',_h);
    document.getElementById('newPass').value='';
    alert('✅ Password পরিবর্তন হয়েছে!');
  }

  renderGrid(movies);
</script>
</body>
</html>
